suite:
  name: shift_light
  version: 0.1.0
  description: 'Lightweight shift benchmark for quick model comparison (KalmanNet_TSP
    vs Adaptive-KNet). Uses smaller data/budgets than suite_shift, but keeps Route-B
    plan semantics.

    '
task:
  task_id: C_shift_Rscale_light_v0
  task_name: 'Noise Shift Light: R scale (Gaussian)'
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 120
  dataset_sizes:
    N_train: 512
    N_val: 128
    N_test: 128
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 60
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    shift.post_shift.R_scale:
    - 3.0
    - 10.0
model:
  model_id: kalmannet_tsp
  display_name: KalmanNet_TSP
  adapter: bench.models.kalmannet_tsp:KalmanNetTSPAdapter
  enabled: true
  repo:
    path: third_party/KalmanNet_TSP
    entrypoints:
      C_shift_Rscale_light_v0: main_linear_canonical.py
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.001
  val_eval_interval_updates: 50
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings:
  shift.post_shift.R_scale: 10.0
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
    obs_distribution:
      name: gaussian
  shift:
    t0: 60
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 10.0
scenario_id: d951006a3e97
scenario_id_resolved_from_cache: true
seed: 0
track_id: budgeted
track_cfg:
  track_id: budgeted
  adaptation_enabled: true
  adaptation_budget:
    max_updates: 80
    max_updates_per_step: 1
    allowed_after_t0_only: true
    overflow_policy: fail
init_id: trained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/shift_light/C_shift_Rscale_light_v0/scenario_d951006a3e97/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/shift_light/C_shift_Rscale_light_v0/scenario_d951006a3e97/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/shift_light/C_shift_Rscale_light_v0/scenario_d951006a3e97/seed_0/test.npz
  canonical_layout: NTD

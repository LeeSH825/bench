suite:
  name: full_compare
  version: 0.1.0
  description: 'Route-B full comparison suite across stationary linear, shift linear,
    and TG5 Lorenz tasks. Includes frozen and budgeted tracks with shared budget semantics
    (optimizer.step counts).

    '
task:
  task_id: TG5_lorenz_fullinfo_full_compare_v0
  task_name: Lorenz Full-Info (Full Compare)
  task_family: lorenz_v0
  system_type: nonlinear
  x_dim: 3
  y_dim: 3
  sequence_length_T: 60
  dataset_sizes:
    N_train: 192
    N_val: 64
    N_test: 64
  lorenz:
    sigma: 10.0
    rho: 28.0
    beta: 2.6666666667
    J_true: 5
    J_assumed: 5
    delta_tau_true: 0.02
    delta_tau_assumed: 0.02
    obs_mode: identity
    state_clip: 100.0
  splits:
    train:
      N: 192
      T: 60
    val:
      N: 64
      T: 60
    test:
      N: 64
      T: 60
  noise:
    Q:
      type: scaled_identity
      q2: 1.0e-05
    R:
      type: scaled_identity
      r2: 0.001
  observation:
    type: full
    h_type: identity
    mode: identity
  mismatch:
    enabled: false
    kind: none
    params: {}
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: maml_knet
  display_name: MAML-KalmanNet
  adapter: bench.models.maml_knet:MAMLKNetAdapter
  enabled: true
  repo:
    path: third_party/MAML_KalmanNet
    entrypoints:
      A_linear_full_compare_v0: main_linear.py
      C_shift_Rscale_full_compare_v0: main_linear.py
      TG5_lorenz_fullinfo_full_compare_v0: main_linear.py
      TG5_lorenz_Jmismatch_full_compare_v0: main_linear.py
  input_layout: BTD
  batch_size: 16
  eval_batch_size: 32
  meta_task_num: 4
  support_size: 8
  query_size: 8
  inner_steps: 1
  inner_lr: 0.05
  outer_lr: 0.001
  update_step_test: 1
  val_eval_interval_updates: 20
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis: {}
scenario_id: 9b73c2c34457
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: untrained
runner_overrides:
  device: cpu
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/full_compare/TG5_lorenz_fullinfo_full_compare_v0/scenario_9b73c2c34457/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/full_compare/TG5_lorenz_fullinfo_full_compare_v0/scenario_9b73c2c34457/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/full_compare/TG5_lorenz_fullinfo_full_compare_v0/scenario_9b73c2c34457/seed_0/test.npz
  canonical_layout: NTD

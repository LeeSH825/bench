suite:
  name: linear_multimodel_compare
  version: 0.1.0
  description: 'Linear-only multi-model comparison suite for fair Train/Val/Test benchmarking.
    Task A: stationary linear full-observation canonical setting. Task B: linear within-sequence
    observation-noise shift (R-scale) for budgeted adapt checks.

    '
task:
  task_id: A_linear_stationary_compare_v0
  task_name: Linear Stationary Canonical (Task A)
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 200
  dataset_sizes:
    N_train: 1024
    N_val: 256
    N_test: 256
  noise:
    form: diag
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: oracle_kf
  display_name: Oracle KF
  adapter: bench.models.mb_kf:ModelBasedKFAdapter
  baseline_mode: oracle
  outputs_covariance: false
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis:
  form: diag
  Q:
    type: scaled_identity
    q2: 0.001
  R:
    type: scaled_identity
    r2: 0.001
scenario_id: 307bc601505c
scenario_id_resolved_from_cache: true
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: pretrained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/A_linear_stationary_compare_v0/scenario_307bc601505c/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/A_linear_stationary_compare_v0/scenario_307bc601505c/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/A_linear_stationary_compare_v0/scenario_307bc601505c/seed_0/test.npz
  canonical_layout: NTD

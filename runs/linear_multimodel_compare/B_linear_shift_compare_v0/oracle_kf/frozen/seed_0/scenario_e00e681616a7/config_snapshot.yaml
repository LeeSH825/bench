suite:
  name: linear_multimodel_compare
  version: 0.1.0
  description: 'Linear-only multi-model comparison suite for fair Train/Val/Test benchmarking.
    Task A: stationary linear full-observation canonical setting. Task B: linear within-sequence
    observation-noise shift (R-scale) for budgeted adapt checks.

    '
task:
  task_id: B_linear_shift_compare_v0
  task_name: Linear Shift Canonical (Task B, t0=100, R_scale=10)
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 200
  dataset_sizes:
    N_train: 1024
    N_val: 256
    N_test: 256
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 100
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: oracle_kf
  display_name: Oracle KF
  adapter: bench.models.mb_kf:ModelBasedKFAdapter
  baseline_mode: oracle
  outputs_covariance: false
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
    obs_distribution:
      name: gaussian
  shift:
    t0: 100
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 10.0
scenario_id: e00e681616a7
scenario_id_resolved_from_cache: true
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: pretrained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/B_linear_shift_compare_v0/scenario_e00e681616a7/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/B_linear_shift_compare_v0/scenario_e00e681616a7/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/linear_multimodel_compare/B_linear_shift_compare_v0/scenario_e00e681616a7/seed_0/test.npz
  canonical_layout: NTD

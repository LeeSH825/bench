suite:
  name: all_simple_tiny
  version: 0.1.0
  description: 'Really small version of all_simple for fast debugging. Every task
    uses total dataset size < 100 and update budgets < 10.

    '
task:
  task_id: C_shift_Rscale_v0
  task_name: 'Noise Shift: R scale (tiny)'
  task_family: linear_gaussian_v0
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 60
  dataset_sizes:
    N_train: 48
    N_val: 24
    N_test: 24
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 30
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 3.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    inv_r2_db:
      values:
      - -10
      - 0
      - 10
      - 20
      - 30
model:
  model_id: maml_knet
  display_name: MAML-KalmanNet
  adapter: bench.models.maml_knet:MAMLKNetAdapter
  enabled: true
  repo:
    path: third_party/MAML_KalmanNet
    entrypoints:
      A_linear_canonical_v0: main_linear.py
      C_shift_Rscale_v0: main_linear.py
      B_lorenz_dt_v0: main_nonlinear.py
      D_nclt_v0: main_linear.py
  outer_lr: 0.0001
  inner_lr: 0.01
  inner_steps: 1
  meta_task_num: 2
  max_grad_norm: 0.5
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
  notes:
    data_generation_use_cuda: false
scenario_settings:
  inv_r2_db: 20
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.01
    obs_distribution:
      name: gaussian
  shift:
    t0: 30
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 3.0
scenario_id: 77512cf2cc1f
cache_scenario_id: 77512cf2cc1f
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: untrained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple_tiny/C_shift_Rscale_v0/scenario_77512cf2cc1f/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple_tiny/C_shift_Rscale_v0/scenario_77512cf2cc1f/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple_tiny/C_shift_Rscale_v0/scenario_77512cf2cc1f/seed_0/test.npz
  canonical_layout: NTD

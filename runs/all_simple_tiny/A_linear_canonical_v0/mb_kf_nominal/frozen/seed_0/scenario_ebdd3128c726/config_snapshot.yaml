suite:
  name: all_simple_tiny
  version: 0.1.0
  description: 'Really small version of all_simple for fast debugging. Every task
    uses total dataset size < 100 and update budgets < 10.

    '
task:
  task_id: A_linear_canonical_v0
  task_name: Linear Canonical (tiny)
  task_family: linear_gaussian_v0
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 16
  dataset_sizes:
    N_train: 48
    N_val: 24
    N_test: 24
  noise:
    form: diag
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    inv_r2_db:
      values:
      - -10
      - 0
      - 10
      - 20
      - 30
model:
  model_id: mb_kf_nominal
  display_name: Model-Based KF (Nominal)
  adapter: bench.models.mb_kf:ModelBasedKFAdapter
  enabled: true
  baseline_mode: nominal
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings:
  inv_r2_db: -10
scenario_cfg_basis:
  form: diag
  Q:
    type: scaled_identity
    q2: 0.001
  R:
    type: scaled_identity
    r2: 10.0
scenario_id: ebdd3128c726
cache_scenario_id: ebdd3128c726
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: untrained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple_tiny/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple_tiny/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple_tiny/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/test.npz
  canonical_layout: NTD

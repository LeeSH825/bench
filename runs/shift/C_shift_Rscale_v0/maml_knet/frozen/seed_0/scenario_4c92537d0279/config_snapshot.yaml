suite:
  name: shift
  version: 0.1.0
  description: 'v0 shift/mismatch 벤치: Frozen vs Budgeted adaptation을 반드시 분리 리포트. (1)
    R 스케일 변화(gaussian 유지) (2) 관측 노이즈 분포 변화(gaussian -> student-t) (MVP) dist shift(C_shift_dist_v0)는
    존재하지만 enabled:false로 비활성화됨.

    '
task:
  task_id: C_shift_Rscale_v0
  task_name: 'Noise Shift: R scale (Gaussian)'
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 200
  dataset_sizes:
    N_train: 2000
    N_val: 500
    N_test: 500
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 100
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    shift.post_shift.R_scale:
    - 3.0
    - 10.0
    - 30.0
model:
  model_id: maml_knet
  display_name: MAML-KalmanNet
  adapter: bench.models.maml_knet:MAMLKNetAdapter
  enabled: false
  repo:
    path: third_party/MAML-KalmanNet
    entrypoints:
      C_shift_Rscale_v0: main_linear.py
      C_shift_dist_v0: main_linear.py
  capabilities:
    supports_adaptation: true
    outputs_covariance: false
    needs_system_model: true
  notes:
    data_generation_use_cuda: false
scenario_settings:
  shift.post_shift.R_scale: 3.0
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
    obs_distribution:
      name: gaussian
  shift:
    t0: 100
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 3.0
scenario_id: 4c92537d0279
scenario_id_resolved_from_cache: true
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
runner_overrides:
  device: cpu
  precision: fp32
data:
  cache_root: /home/xynus/bench_data_cache
  test_npz: /home/xynus/bench_data_cache/shift/C_shift_Rscale_v0/scenario_4c92537d0279/seed_0/test.npz
  canonical_layout: NTD

suite:
  name: fig5a_overlay_smoke
  version: 0.1.0
  description: 'Tiny Fig.5(a)-style overlay smoke suite for KalmanNet_TSP vs oracle_kf.
    nu=0dB (q2=r2), linear full-information canonical setting.

    '
task:
  task_id: F5aS_m2n2_T50_invR2db_0
  task_name: Fig5a SMOKE 2x2 T50 inv_r2_db=0
  system_type: linear
  x_dim: 2
  y_dim: 2
  sequence_length_T: 50
  dataset_sizes:
    N_train: 64
    N_val: 16
    N_test: 16
  noise:
    Q:
      type: scaled_identity
      q2: 1.0
    R:
      type: scaled_identity
      r2: 1.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: kalmannet_tsp
  display_name: KalmanNet_TSP
  adapter: bench.models.kalmannet_tsp:KalmanNetTSPAdapter
  enabled: true
  repo:
    path: third_party/KalmanNet_TSP
    entrypoints:
      F5aS_m2n2_T50_invR2db_0: main_linear_canonical.py
      F5aS_m2n2_T50_invR2db_20: main_linear_canonical.py
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.001
  val_eval_interval_updates: 5
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis: {}
scenario_id: 25d2a52efd85
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: trained
runner_overrides:
  device: cpu
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/fig5a_overlay_smoke/F5aS_m2n2_T50_invR2db_0/scenario_25d2a52efd85/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/fig5a_overlay_smoke/F5aS_m2n2_T50_invR2db_0/scenario_25d2a52efd85/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/fig5a_overlay_smoke/F5aS_m2n2_T50_invR2db_0/scenario_25d2a52efd85/seed_0/test.npz
  canonical_layout: NTD

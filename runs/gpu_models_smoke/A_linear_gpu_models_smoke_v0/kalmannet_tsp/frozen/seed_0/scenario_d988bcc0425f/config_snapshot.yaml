suite:
  name: gpu_models_smoke
  version: 0.1.0
  description: 'Tiny GPU smoke suite to validate CUDA device handling across model
    adapters.

    '
task:
  task_id: A_linear_gpu_models_smoke_v0
  task_name: Linear Canonical GPU Device Smoke
  system_type: linear
  x_dim: 2
  y_dim: 2
  sequence_length_T: 16
  dataset_sizes:
    N_train: 16
    N_val: 4
    N_test: 4
  noise:
    form: diag
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: kalmannet_tsp
  display_name: KalmanNet_TSP
  adapter: bench.models.kalmannet_tsp:KalmanNetTSPAdapter
  repo:
    path: third_party/KalmanNet_TSP
    entrypoints:
      A_linear_gpu_models_smoke_v0: main_linear_canonical.py
  input_layout: BTD
  batch_size: 2
  lr: 0.0001
  weight_decay: 0.001
  val_eval_interval_updates: 2
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis:
  form: diag
  Q:
    type: scaled_identity
    q2: 0.001
  R:
    type: scaled_identity
    r2: 0.001
scenario_id: d988bcc0425f
scenario_id_resolved_from_cache: true
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: trained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /home/xynus/bench/bench_data_cache
  train_npz: /home/xynus/bench/bench_data_cache/gpu_models_smoke/A_linear_gpu_models_smoke_v0/scenario_d988bcc0425f/seed_0/train.npz
  val_npz: /home/xynus/bench/bench_data_cache/gpu_models_smoke/A_linear_gpu_models_smoke_v0/scenario_d988bcc0425f/seed_0/val.npz
  test_npz: /home/xynus/bench/bench_data_cache/gpu_models_smoke/A_linear_gpu_models_smoke_v0/scenario_d988bcc0425f/seed_0/test.npz
  canonical_layout: NTD

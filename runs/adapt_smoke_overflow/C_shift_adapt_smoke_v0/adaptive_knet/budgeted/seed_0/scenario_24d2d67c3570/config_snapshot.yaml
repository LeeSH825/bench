suite:
  name: adapt_smoke_overflow
  version: 0.1.0
  description: 'Tiny Route-B suite that intentionally overflows budgeted adaptation
    budget.

    '
task:
  task_id: C_shift_adapt_smoke_v0
  task_name: Linear Shift Tiny
  system_type: linear
  x_dim: 2
  y_dim: 2
  sequence_length_T: 16
  dataset_sizes:
    N_train: 32
    N_val: 8
    N_test: 8
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 8
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep: {}
model:
  model_id: adaptive_knet
  display_name: Adaptive-KNet-ICASSP24
  adapter: bench.models.adaptive_knet:AdaptiveKNetAdapter
  repo:
    path: third_party/Adaptive-KNet-ICASSP24
    entrypoints:
      C_shift_adapt_smoke_v0: main_cm_linear.py
  estimator_class_path: mnets.KNet_mnet.KalmanNetNN
  input_layout: BTD
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.001
  val_eval_interval_updates: 2
  knet_trainable: true
  adapt_lr: 1.0e-05
  adapt_overflow_policy: fail
  capabilities:
    supports_adaptation: true
    outputs_covariance: false
    needs_system_model: true
scenario_settings: {}
scenario_cfg_basis: {}

suite:
  name: all_simple
  version: 0.1.0
  description: 'Simple all-in-one suite covering linear, shift, lorenz, and NCLT-style
    tasks. Designed for broad model coverage with explicit budget caps.

    '
task:
  task_id: C_shift_Rscale_v0
  task_name: 'Noise Shift: R scale (Gaussian)'
  task_family: linear_gaussian_v0
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 200
  dataset_sizes:
    N_train: 2000
    N_val: 500
    N_test: 500
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 100
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    shift.post_shift.R_scale:
      tuple:
      - 3.0
      - 30.0
      - 3
model:
  model_id: split_knet
  display_name: Split-KalmanNet
  adapter: bench.models.split_knet:SplitKNetAdapter
  enabled: true
  repo:
    path: third_party/Split_KalmanNet
    entrypoints:
      A_linear_canonical_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      C_shift_Rscale_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      B_lorenz_dt_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      D_nclt_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
  estimator_class_path: GSSFiltering.filtering.Split_KalmanNet_Filter
  lr: 0.0001
  max_grad_norm: 1.0
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: false
scenario_settings:
  shift.post_shift.R_scale: 16.5
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
    obs_distribution:
      name: gaussian
  shift:
    t0: 100
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 16.5
scenario_id: 95884c87f654
cache_scenario_id: 43be8e6488ee
scenario_id_resolved_from_cache: true
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: trained
runner_overrides:
  device: cpu
  precision: fp32
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple/C_shift_Rscale_v0/scenario_43be8e6488ee/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple/C_shift_Rscale_v0/scenario_43be8e6488ee/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple/C_shift_Rscale_v0/scenario_43be8e6488ee/seed_0/test.npz
  canonical_layout: NTD

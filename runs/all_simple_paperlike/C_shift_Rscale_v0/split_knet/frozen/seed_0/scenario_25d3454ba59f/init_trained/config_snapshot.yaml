suite:
  name: all_simple_paperlike
  version: 0.1.0
  description: 'Repo-scale, paper-oriented version of all_simple. This suite uses
    dataset sizes and sequence lengths closer to the bundled third-party repositories,
    but it is still an approximation: exact paper reproduction remains model-specific
    because KalmanNet_TSP, Adaptive-KNet, MAML-KalmanNet, and Split-KalmanNet do not
    share one identical protocol.

    '
task:
  task_id: C_shift_Rscale_v0
  task_name: 'Noise Shift: R scale (paper-like)'
  task_family: linear_gaussian_v0
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 100
  dataset_sizes:
    N_train: 1000
    N_val: 100
    N_test: 200
  noise:
    pre_shift:
      Q:
        type: scaled_identity
        q2: 0.001
      R:
        type: scaled_identity
        r2: 0.001
      obs_distribution:
        name: gaussian
    shift:
      t0: 50
      post_shift:
        obs_distribution:
          name: gaussian
        R_scale: 10.0
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    inv_r2_db:
      values:
      - -10
      - 0
      - 10
      - 20
      - 30
model:
  model_id: split_knet
  display_name: Split-KalmanNet
  adapter: bench.models.split_knet:SplitKNetAdapter
  enabled: true
  repo:
    path: third_party/Split_KalmanNet
    entrypoints:
      A_linear_canonical_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      C_shift_Rscale_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      B_lorenz_dt_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
      D_nclt_v0: GSSFiltering/filtering.py::Split_KalmanNet_Filter
  estimator_class_path: GSSFiltering.filtering.Split_KalmanNet_Filter
  lr: 0.001
  weight_decay: 0.0
  max_grad_norm: 10.0
  val_eval_interval_updates: 25
  train_init_from_gt: true
  eval_init_from_gt: false
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: false
  notes:
    repo_defaults:
      synthetic_train_seq_num: 500
      synthetic_valid_seq_num: 5
      synthetic_test_seq_num: 10
      synthetic_train_seq_len: 15
      synthetic_valid_seq_len: 50
      synthetic_test_seq_len: 100
      train_iter_synthetic: 500
      train_iter_nclt: 4000
scenario_settings:
  inv_r2_db: -10
scenario_cfg_basis:
  pre_shift:
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 10.0
    obs_distribution:
      name: gaussian
  shift:
    t0: 50
    post_shift:
      obs_distribution:
        name: gaussian
      R_scale: 10.0
scenario_id: 25d3454ba59f
cache_scenario_id: 25d3454ba59f
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: trained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple_paperlike/C_shift_Rscale_v0/scenario_25d3454ba59f/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple_paperlike/C_shift_Rscale_v0/scenario_25d3454ba59f/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple_paperlike/C_shift_Rscale_v0/scenario_25d3454ba59f/seed_0/test.npz
  canonical_layout: NTD

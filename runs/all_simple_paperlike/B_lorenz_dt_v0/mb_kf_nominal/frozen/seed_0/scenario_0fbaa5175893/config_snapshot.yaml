suite:
  name: all_simple_paperlike
  version: 0.1.0
  description: 'Repo-scale, paper-oriented version of all_simple. This suite uses
    dataset sizes and sequence lengths closer to the bundled third-party repositories,
    but it is still an approximation: exact paper reproduction remains model-specific
    because KalmanNet_TSP, Adaptive-KNet, MAML-KalmanNet, and Split-KalmanNet do not
    share one identical protocol.

    '
task:
  task_id: B_lorenz_dt_v0
  task_name: Lorenz Attractor (DT, partial obs, paper-like)
  task_family: lorenz_v0
  system_type: nonlinear
  x_dim: 3
  y_dim: 2
  sequence_length_T: 100
  dataset_sizes:
    N_train: 1000
    N_val: 100
    N_test: 200
  lorenz:
    sigma: 10.0
    rho: 28.0
    beta: 2.6666666667
    J_true: 5
    J_assumed: 5
    delta_tau_true: 0.02
    delta_tau_assumed: 0.02
    obs_mode: partial
    state_clip: 100.0
  noise:
    Q:
      type: scaled_identity
      q2: 0.0001
    R:
      type: scaled_identity
      r2: 0.1
  observation:
    type: partial
    h_type: partial
    mode: partial
  mismatch:
    enabled: false
    kind: none
    params: {}
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    inv_r2_db:
      values:
      - -10
      - 0
      - 10
      - 20
      - 30
model:
  model_id: mb_kf_nominal
  display_name: Model-Based KF (Nominal)
  adapter: bench.models.mb_kf:ModelBasedKFAdapter
  enabled: true
  baseline_mode: nominal
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
scenario_settings:
  inv_r2_db: 30
scenario_cfg_basis:
  Q:
    type: scaled_identity
    q2: 0.0001
  R:
    type: scaled_identity
    r2: 0.001
scenario_id: 0fbaa5175893
cache_scenario_id: 0fbaa5175893
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: untrained
runner_overrides:
  device: cuda
  precision: fp32
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple_paperlike/B_lorenz_dt_v0/scenario_0fbaa5175893/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple_paperlike/B_lorenz_dt_v0/scenario_0fbaa5175893/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple_paperlike/B_lorenz_dt_v0/scenario_0fbaa5175893/seed_0/test.npz
  canonical_layout: NTD

suite:
  name: all_simple_paperlike
  version: 0.1.0
  description: 'Repo-scale, paper-oriented version of all_simple. This suite uses
    dataset sizes and sequence lengths closer to the bundled third-party repositories,
    but it is still an approximation: exact paper reproduction remains model-specific
    because KalmanNet_TSP, Adaptive-KNet, MAML-KalmanNet, and Split-KalmanNet do not
    share one identical protocol.

    '
task:
  task_id: A_linear_canonical_v0
  task_name: Linear Canonical (paper-like)
  task_family: linear_gaussian_v0
  system_type: linear
  x_dim: 5
  y_dim: 5
  sequence_length_T: 100
  dataset_sizes:
    N_train: 1000
    N_val: 100
    N_test: 200
  noise:
    form: diag
    Q:
      type: scaled_identity
      q2: 0.001
    R:
      type: scaled_identity
      r2: 0.001
  observation:
    type: full
    h_type: linear
    H: canonical_inverse
  control_input_u: false
  ground_truth:
    has_gt: true
  sweep:
    inv_r2_db:
      values:
      - -10
      - 0
      - 10
      - 20
      - 30
model:
  model_id: kalmannet_tsp
  display_name: KalmanNet_TSP
  adapter: bench.models.kalmannet_tsp:KalmanNetTSPAdapter
  enabled: true
  repo:
    path: third_party/KalmanNet_TSP
    entrypoints:
      A_linear_canonical_v0: main_linear_canonical.py
      C_shift_Rscale_v0: main_linear_canonical.py
      B_lorenz_dt_v0: main_lor_DT.py
      D_nclt_v0: main_linear_canonical.py
  batch_size: 30
  lr: 0.0001
  weight_decay: 0.001
  max_grad_norm: 1.0
  train_steps_hint: 4000
  val_eval_interval_updates: 100
  capabilities:
    supports_adaptation: false
    outputs_covariance: false
    needs_system_model: true
  notes:
    repo_defaults:
      N_E: 1000
      N_CV: 100
      N_T: 200
      T: 100
      n_steps: 4000
scenario_settings:
  inv_r2_db: -10
scenario_cfg_basis:
  form: diag
  Q:
    type: scaled_identity
    q2: 0.001
  R:
    type: scaled_identity
    r2: 10.0
scenario_id: ebdd3128c726
cache_scenario_id: ebdd3128c726
scenario_id_resolved_from_cache: false
seed: 0
track_id: frozen
track_cfg:
  track_id: frozen
  adaptation_enabled: false
init_id: trained
runner_overrides:
  device: cuda
  precision: fp32
  logging:
    level: DEBUG
    log_to_file: true
    log_file: null
    debug_every: 1
data:
  cache_root: /tmp/bench_data_cache
  train_npz: /tmp/bench_data_cache/all_simple_paperlike/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/train.npz
  val_npz: /tmp/bench_data_cache/all_simple_paperlike/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/val.npz
  test_npz: /tmp/bench_data_cache/all_simple_paperlike/A_linear_canonical_v0/scenario_ebdd3128c726/seed_0/test.npz
  canonical_layout: NTD

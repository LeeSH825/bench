suite:
  name: cache_smoke
  version: "0.1.0"
  description: >
    Tiny Route-B suite to validate model_cache_dir hit/miss behavior.

seeds: [0]

tasks:
  - task_id: A_linear_cache_smoke_v0
    task_name: "Linear Cache Tiny"
    system_type: linear
    x_dim: 3
    y_dim: 3
    sequence_length_T: 24
    dataset_sizes:
      N_train: 24
      N_val: 8
      N_test: 8
    noise:
      form: "diag"
      Q:
        type: "scaled_identity"
        q2: 1.0e-3
      R:
        type: "scaled_identity"
        r2: 1.0e-3
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

models:
  - model_id: kalmannet_tsp
    display_name: "KalmanNet_TSP"
    adapter: "bench.models.kalmannet_tsp:KalmanNetTSPAdapter"
    repo:
      path: "third_party/KalmanNet_TSP"
      entrypoints:
        A_linear_cache_smoke_v0: "main_linear_canonical.py"
    batch_size: 4
    lr: 1.0e-4
    weight_decay: 1.0e-3
    val_eval_interval_updates: 2
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cpu"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  model_cache_dir: "runs/_model_cache/cache_smoke"
  budget:
    train_max_updates: 8
    train_batch_size: 4
    eval_batch_size: 4
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 0
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    enabled: false

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "checkpoints/model.pt"
    - "checkpoints/train_state.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
  tables:
    summary_csv: "reports/summary_cache_smoke.csv"

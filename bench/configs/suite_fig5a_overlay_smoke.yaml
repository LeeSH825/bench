suite:
  name: fig5a_overlay_smoke
  version: "0.1.0"
  description: >
    Tiny Fig.5(a)-style overlay smoke suite for KalmanNet_TSP vs oracle_kf.
    nu=0dB (q2=r2), linear full-information canonical setting.

seeds: [0]

tasks:
  - task_id: F5aS_m2n2_T50_invR2db_0
    task_name: "Fig5a SMOKE 2x2 T50 inv_r2_db=0"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 50
    dataset_sizes: { N_train: 64, N_val: 16, N_test: 16 }
    noise:
      Q: { type: "scaled_identity", q2: 1.0 }
      R: { type: "scaled_identity", r2: 1.0 }
    observation: { type: "full", h_type: "linear", H: "canonical_inverse" }
    control_input_u: false
    ground_truth: { has_gt: true }
    sweep: {}

  - task_id: F5aS_m2n2_T50_invR2db_20
    task_name: "Fig5a SMOKE 2x2 T50 inv_r2_db=20"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 50
    dataset_sizes: { N_train: 64, N_val: 16, N_test: 16 }
    noise:
      Q: { type: "scaled_identity", q2: 0.01 }
      R: { type: "scaled_identity", r2: 0.01 }
    observation: { type: "full", h_type: "linear", H: "canonical_inverse" }
    control_input_u: false
    ground_truth: { has_gt: true }
    sweep: {}

models:
  - model_id: oracle_kf
    display_name: "Oracle KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "oracle"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: kalmannet_tsp
    display_name: "KalmanNet_TSP"
    adapter: "bench.models.kalmannet_tsp:KalmanNetTSPAdapter"
    enabled: true
    repo:
      path: "third_party/KalmanNet_TSP"
      entrypoints:
        F5aS_m2n2_T50_invR2db_0: "main_linear_canonical.py"
        F5aS_m2n2_T50_invR2db_20: "main_linear_canonical.py"
    batch_size: 16
    lr: 1.0e-4
    weight_decay: 1.0e-3
    val_eval_interval_updates: 5
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cpu"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  model_cache_dir: "runs/_model_cache/fig5a_overlay_smoke"
  budget:
    train_max_updates: 20
    train_batch_size: 16
    eval_batch_size: 16
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 2
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll"]
  nll_policy:
    if_no_covariance: "NA"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "checkpoints/model.pt"
    - "checkpoints/train_state.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
    - "env.txt"
    - "git_versions.txt"
  tables:
    summary_csv: "reports/summary_fig5a_overlay_smoke.csv"

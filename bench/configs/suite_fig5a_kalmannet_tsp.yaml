suite:
  name: fig5a_kalmannet_tsp
  version: "0.1.0"
  description: >
    Fig.5(a)-style reproduction suite for KalmanNet_TSP.
    Objective: MSE[dB] vs inv_r2_db under linear full-information canonical conditions.
    Rule: nu=0dB -> q2=r2 for each task point.
    NOTE: Full-information canonical requires y_dim==x_dim with H=canonical_inverse.

seeds: [0]

tasks:
  # ---- (m,n,T) = (2,2,50) ----
  - task_id: F5a_m2n2_T50_invR2db_m5
    task_name: "Fig5a 2x2 T50 inv_r2_db=-5"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 50
    dataset_sizes: { N_train: 800, N_val: 200, N_test: 200 }
    noise:
      Q: { type: "scaled_identity", q2: 3.1622776601683795 }
      R: { type: "scaled_identity", r2: 3.1622776601683795 }
    observation: { type: "full", h_type: "linear", H: "canonical_inverse" }
    control_input_u: false
    ground_truth: { has_gt: true }
    sweep: {}

  - task_id: F5a_m2n2_T50_invR2db_0

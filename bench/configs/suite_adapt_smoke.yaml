suite:
  name: adapt_smoke
  version: "0.1.0"
  description: >
    Tiny Route-B smoke suite for Adaptive-KNet trained+frozen and trained+budgeted plans.

seeds: [0]

tasks:
  - task_id: C_shift_adapt_smoke_v0
    task_name: "Linear Shift Tiny"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 16
    dataset_sizes:
      N_train: 32
      N_val: 8
      N_test: 8
    noise:
      pre_shift:
        Q: { type: "scaled_identity", q2: 1.0e-3 }
        R: { type: "scaled_identity", r2: 1.0e-3 }
        obs_distribution: { name: "gaussian" }
      shift:
        t0: 8
        post_shift:
          obs_distribution: { name: "gaussian" }
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

models:
  - model_id: adaptive_knet
    display_name: "Adaptive-KNet-ICASSP24"
    adapter: "bench.models.adaptive_knet:AdaptiveKNetAdapter"
    repo:
      path: "third_party/Adaptive-KNet-ICASSP24"
      entrypoints:
        C_shift_adapt_smoke_v0: "main_cm_linear.py"
    estimator_class_path: "mnets.KNet_mnet.KalmanNetNN"
    input_layout: "BTD"
    batch_size: 4
    lr: 1.0e-4
    weight_decay: 1.0e-3
    val_eval_interval_updates: 2
    knet_trainable: true
    adapt_lr: 1.0e-5
    adapt_overflow_policy: "fail"
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cpu"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  budget:
    train_max_updates: 6
    train_batch_size: 4
    eval_batch_size: 4
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 0
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false
    - track_id: budgeted
      adaptation_enabled: true
      adaptation_budget:
        max_updates: 8
        max_updates_per_step: 1
        allowed_after_t0_only: true
        overflow_policy: "fail"

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll", "shift_recovery_k"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    window_W: 8
    tolerance_eps: 0.05
    metric: "mse"
    aggregation: "mean_over_window"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "checkpoints/model.pt"
    - "checkpoints/train_state.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
  tables:
    summary_csv: "reports/summary_adapt_smoke.csv"

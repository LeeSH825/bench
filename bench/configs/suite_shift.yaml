suite:
  name: shift
  version: "0.1.0"
  description: >
    v0 shift/mismatch 벤치: Frozen vs Budgeted adaptation을 반드시 분리 리포트.
    (1) R 스케일 변화(gaussian 유지)
    (2) 관측 노이즈 분포 변화(gaussian -> student-t)
    (MVP) dist shift(C_shift_dist_v0)는 존재하지만 enabled:false로 비활성화됨.

seeds: [0, 1, 2]

tasks:
  - task_id: C_shift_Rscale_v0
    task_name: "Noise Shift: R scale (Gaussian)"
    system_type: linear
    x_dim: 5
    y_dim: 5
    sequence_length_T: 200
    dataset_sizes:
      N_train: 2000
      N_val: 500
      N_test: 500
    noise:
      pre_shift:
        Q: { type: "scaled_identity", q2: 1.0e-3 }
        R: { type: "scaled_identity", r2: 1.0e-3 }
        obs_distribution: { name: "gaussian" }
      shift:
        t0: 100
        post_shift:
          obs_distribution: { name: "gaussian" }
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      shift.post_shift.R_scale: [3.0, 10.0, 30.0]

  - task_id: C_shift_dist_v0
    task_name: "Noise Shift: distribution (Gaussian -> Student-t)"
    system_type: linear
    enabled: false # MVP 범위 외(D12)
    x_dim: 5
    y_dim: 5
    sequence_length_T: 200
    dataset_sizes:
      N_train: 2000
      N_val: 500
      N_test: 500
    noise:
      pre_shift:
        Q: { type: "scaled_identity", q2: 1.0e-3 }
        R: { type: "scaled_identity", r2: 1.0e-3 }
        obs_distribution: { name: "gaussian" }
      shift:
        t0: 100
        post_shift:
          obs_distribution:
            name: "student_t"
            df: 3
            match_variance_to_pre: true
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      shift.post_shift.R_scale: [3.0, 10.0, 30.0]
      shift.post_shift.obs_distribution.df: [3, 5]

models:
  - model_id: kalmannet_tsp
    display_name: "KalmanNet_TSP"
    adapter: "bench.models.kalmannet_tsp:KalmanNetTSPAdapter"
    enabled: true
    repo:
      path: "third_party/KalmanNet_TSP"
      entrypoints:
        C_shift_Rscale_v0: "main_linear_canonical.py"  # CONFIRMED(script exists; shift는 bench_generated로 주입)
        C_shift_dist_v0: "main_linear_canonical.py"  # CONFIRMED(script exists; shift는 bench_generated로 주입)
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: adaptive_knet
    display_name: "Adaptive-KNet-ICASSP24"
    adapter: "bench.models.adaptive_knet:AdaptiveKNetAdapter"
    enabled: true
    repo:
      path: "third_party/Adaptive-KNet-ICASSP24"
      entrypoints:
        C_shift_Rscale_v0: "main_cm_linear_noise.py"  # CONFIRMED(script exists; shift는 bench_generated로 주입)
        C_shift_dist_v0: "main_cm_linear_noise.py"  # CONFIRMED(script exists; shift는 bench_generated로 주입)
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: true

  - model_id: maml_knet
    display_name: "MAML-KalmanNet"
    adapter: "bench.models.maml_knet:MAMLKNetAdapter"
    enabled: false
    repo:
      path: "third_party/MAML-KalmanNet"
      entrypoints:
        C_shift_Rscale_v0: "main_linear.py"  # CONFIRMED(script exists; within-seq shift는 직접 지원 불명확 → model.enabled=false 유지)
        C_shift_dist_v0: "main_linear.py"  # CONFIRMED(script exists; within-seq shift는 직접 지원 불명확 → model.enabled=false 유지)
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: true
    notes:
      data_generation_use_cuda: false

  - model_id: my_model
    display_name: "<내_모델_이름>"
    adapter: "bench.models.my_model:MyModelAdapter"
    enabled: true
    repo:
      path: null
      entrypoints:
        C_shift_Rscale_v0: "adapter_native"  # ASSUMPTION
        C_shift_dist_v0: "adapter_native"    # ASSUMPTION
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: false

runner:
  device: "cuda"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  budget:
    train_max_updates: 20000
    eval_batch_size: 32
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 10
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false
    - track_id: budgeted
      adaptation_enabled: true
      adaptation_budget:
        max_updates: 200
        max_updates_per_step: 1
        allowed_after_t0_only: true

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll", "shift_recovery_k"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    window_W: 20
    tolerance_eps: 0.05
    metric: "mse"
    aggregation: "mean_over_window"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
    - "env.txt"
    - "git_versions.txt"
  tables:
    summary_csv: "reports/summary_shift.csv"
  plots:
    - "mse_vs_time.png"
    - "shift_recovery_curve.png"
    - "mismatch_severity_sweep.png"


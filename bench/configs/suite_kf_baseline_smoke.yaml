suite:
  name: kf_baseline_smoke
  version: "0.1.0"
  description: >
    Tiny smoke suite for bench-native model-based KF baselines (oracle/nominal/oracle_shift).

seeds: [0]

tasks:
  - task_id: A_linear_kf_baseline_smoke_v0
    task_name: "Linear No-Shift Tiny (KF baseline)"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 20
    dataset_sizes:
      N_train: 12
      N_val: 4
      N_test: 6
    noise:
      form: "diag"
      Q:
        type: "scaled_identity"
        q2: 1.0e-3
      R:
        type: "scaled_identity"
        r2: 1.0e-3
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

  - task_id: C_shift_kf_baseline_smoke_v0
    task_name: "Linear Shift Tiny (KF baseline)"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 24
    dataset_sizes:
      N_train: 16
      N_val: 4
      N_test: 8
    noise:
      pre_shift:
        Q:
          type: "scaled_identity"
          q2: 1.0e-3
        R:
          type: "scaled_identity"
          r2: 1.0e-3
        obs_distribution:
          name: "gaussian"
      shift:
        t0: 12
        post_shift:
          obs_distribution:
            name: "gaussian"
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

models:
  - model_id: oracle_kf
    display_name: "Oracle KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "oracle"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: nominal_kf
    display_name: "Nominal KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "nominal"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: oracle_shift_kf
    display_name: "Oracle Shift KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "oracle_shift"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cpu"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  budget:
    train_max_updates: 1
    train_batch_size: 4
    eval_batch_size: 4
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 0
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll", "shift_recovery_k"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    window_W: 8
    tolerance_eps: 0.05
    metric: "mse"
    aggregation: "mean_over_window"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
  tables:
    summary_csv: "reports/summary_kf_baseline_smoke.csv"

suite:
  name: linear_multimodel_compare
  version: "0.1.0"
  description: >
    Linear-only multi-model comparison suite for fair Train/Val/Test benchmarking.
    Task A: stationary linear full-observation canonical setting.
    Task B: linear within-sequence observation-noise shift (R-scale) for budgeted adapt checks.

seeds: [0, 1, 2]

tasks:
  - task_id: A_linear_stationary_compare_v0
    task_name: "Linear Stationary Canonical (Task A)"
    system_type: linear
    x_dim: 5
    y_dim: 5
    sequence_length_T: 200
    dataset_sizes:
      N_train: 1024
      N_val: 256
      N_test: 256
    noise:
      form: "diag"
      Q:
        type: "scaled_identity"
        q2: 1.0e-3
      R:
        type: "scaled_identity"
        r2: 1.0e-3
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

  - task_id: B_linear_shift_compare_v0
    task_name: "Linear Shift Canonical (Task B, t0=100, R_scale=10)"
    system_type: linear
    x_dim: 5
    y_dim: 5
    sequence_length_T: 200
    dataset_sizes:
      N_train: 1024
      N_val: 256
      N_test: 256
    noise:
      pre_shift:
        Q: { type: "scaled_identity", q2: 1.0e-3 }
        R: { type: "scaled_identity", r2: 1.0e-3 }
        obs_distribution: { name: "gaussian" }
      shift:
        t0: 100
        post_shift:
          obs_distribution: { name: "gaussian" }
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

models:
  - model_id: oracle_kf
    display_name: "Oracle KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "oracle"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: nominal_kf
    display_name: "Nominal KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "nominal"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: oracle_shift_kf
    display_name: "Oracle Shift KF"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    baseline_mode: "oracle_shift"
    outputs_covariance: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: kalmannet_tsp
    display_name: "KalmanNet_TSP"
    adapter: "bench.models.kalmannet_tsp:KalmanNetTSPAdapter"
    repo:
      path: "third_party/KalmanNet_TSP"
      entrypoints:
        A_linear_stationary_compare_v0: "main_linear_canonical.py"
        B_linear_shift_compare_v0: "main_linear_canonical.py"
    input_layout: "BTD"
    batch_size: 32
    lr: 1.0e-4
    weight_decay: 1.0e-3
    val_eval_interval_updates: 50
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: adaptive_knet
    display_name: "Adaptive-KNet-ICASSP24"
    adapter: "bench.models.adaptive_knet:AdaptiveKNetAdapter"
    repo:
      path: "third_party/Adaptive-KNet-ICASSP24"
      entrypoints:
        A_linear_stationary_compare_v0: "main_linear_canonical.py"
        B_linear_shift_compare_v0: "main_cm_linear_noise.py"
    estimator_class_path: "mnets.KNet_mnet.KalmanNetNN"
    input_layout: "BTD"
    batch_size: 32
    lr: 1.0e-4
    weight_decay: 1.0e-3
    val_eval_interval_updates: 50
    knet_trainable: true
    adapt_lr: 1.0e-5
    adapt_overflow_policy: "fail"
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: true

  - model_id: maml_knet
    display_name: "MAML-KalmanNet"
    adapter: "bench.models.maml_knet:MAMLKNetAdapter"
    repo:
      path: "third_party/MAML_KalmanNet"
      entrypoints:
        A_linear_stationary_compare_v0: "main_linear.py"
        B_linear_shift_compare_v0: "main_linear.py"
    input_layout: "BTD"
    batch_size: 32
    eval_batch_size: 64
    meta_task_num: 4
    support_size: 8
    query_size: 8
    inner_steps: 1
    inner_lr: 5.0e-2
    outer_lr: 1.0e-3
    update_step_test: 1
    val_eval_interval_updates: 50
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: split_knet
    display_name: "Split-KalmanNet"
    adapter: "bench.models.split_knet:SplitKNetAdapter"
    repo:
      path: "third_party/Split_KalmanNet"
      entrypoints:
        A_linear_stationary_compare_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
        B_linear_shift_compare_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
    estimator_class_path: "GSSFiltering.filtering.Split_KalmanNet_Filter"
    input_layout: "BTD"
    batch_size: 32
    lr: 1.0e-3
    weight_decay: 0.0
    val_eval_interval_updates: 50
    train_init_from_gt: true
    eval_init_from_gt: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cuda"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  model_cache_dir: "runs/_model_cache/linear_multimodel_compare"
  budget:
    # D16 enforced unit: optimizer.step() count
    train_max_updates: 640
    train_batch_size: 32
    eval_batch_size: 64
    epochs_target: 20
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 8
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false
    - track_id: budgeted
      adaptation_enabled: true
      adaptation_budget:
        max_updates: 200
        max_updates_per_step: 1
        allowed_after_t0_only: true
        overflow_policy: "fail"

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll", "shift_recovery_k"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    window_W: 20
    tolerance_eps: 0.05
    metric: "mse"
    aggregation: "mean_over_window"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "checkpoints/model.pt"
    - "checkpoints/train_state.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
    - "env.txt"
    - "git_versions.txt"
  tables:
    summary_csv: "reports/summary_linear_multimodel_compare.csv"

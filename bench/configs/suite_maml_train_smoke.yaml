suite:
  name: maml_train_smoke
  version: "0.1.0"
  description: >
    Tiny Route-B smoke suite for MAML-KalmanNet trained+frozen plan.

seeds: [0]

tasks:
  - task_id: A_linear_maml_train_smoke_v0
    task_name: "Linear Canonical Tiny (MAML-KNet)"
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 16
    dataset_sizes:
      N_train: 20
      N_val: 8
      N_test: 8
    noise:
      form: "diag"
      Q:
        type: "scaled_identity"
        q2: 1.0e-3
      R:
        type: "scaled_identity"
        r2: 1.0e-3
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

models:
  - model_id: maml_knet
    display_name: "MAML-KalmanNet"
    adapter: "bench.models.maml_knet:MAMLKNetAdapter"
    repo:
      path: "third_party/MAML_KalmanNet"
      entrypoints:
        A_linear_maml_train_smoke_v0: "main_linear.py"
    input_layout: "BTD"
    batch_size: 4
    eval_batch_size: 4
    meta_task_num: 2
    support_size: 4
    query_size: 4
    inner_steps: 1
    inner_lr: 5.0e-2
    outer_lr: 1.0e-3
    update_step: 1
    update_step_test: 1
    val_eval_interval_updates: 2
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

runner:
  device: "cpu"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  budget:
    train_max_updates: 6
    train_batch_size: 4
    eval_batch_size: 4
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 0
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    enabled: false

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "run_plan.json"
    - "budget_ledger.json"
    - "checkpoints/model.pt"
    - "checkpoints/train_state.json"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
  tables:
    summary_csv: "reports/summary_maml_train_smoke.csv"

suite:
  name: switching_smoke
  version: "0.1.0"
  description: >
    Tiny TG6 smoke suite for linear switching dynamics with abrupt model changes.

seeds: [0]

tasks:
  - task_id: TG6_switching_linear_smoke_v0
    task_name: "TG6 Switching Linear Smoke"
    task_family: switching_dynamics_v0
    system_type: linear
    x_dim: 2
    y_dim: 2
    sequence_length_T: 40
    dataset_sizes:
      N_train: 8
      N_val: 4
      N_test: 4
    noise:
      Q: { type: "scaled_identity", q2: 1.0e-6 }
      R: { type: "scaled_identity", r2: 1.0e-6 }
    model_A:
      F:
        - [1.0, 0.0]
        - [0.0, 1.0]
      H:
        - [1.0, 0.0]
        - [0.0, 1.0]
      q2: 1.0e-6
      r2: 1.0e-6
    model_B:
      F:
        - [-1.0, 0.0]
        - [0.0, -1.0]
      H:
        - [1.0, 0.0]
        - [0.0, 1.0]
      q2: 1.0e-6
      r2: 1.0e-6
    switching:
      t_change_range: [10, 10]
      sample_per_sequence: true
      retrain_window: 5
    assumed_policy: A_only
    observation:
      type: "full"
      h_type: "linear"
      mode: "linear"
    mismatch:
      enabled: true
      kind: "switching_dynamics"
      params:
        assumed_policy: "A_only"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep: {}

suite:
  name: all_simple_paperlike
  version: "0.1.0"
  description: >
    Repo-scale, paper-oriented version of all_simple.
    This suite uses dataset sizes and sequence lengths closer to the bundled
    third-party repositories, but it is still an approximation: exact paper
    reproduction remains model-specific because KalmanNet_TSP, Adaptive-KNet,
    MAML-KalmanNet, and Split-KalmanNet do not share one identical protocol.

seeds: [0]

tasks:
  - task_id: A_linear_canonical_v0
    task_name: "Linear Canonical (paper-like)"
    task_family: linear_gaussian_v0
    system_type: linear
    x_dim: 5
    y_dim: 5
    sequence_length_T: 100
    dataset_sizes:
      N_train: 1000
      N_val: 100
      N_test: 200
    noise:
      form: "diag"
      Q:
        type: "scaled_identity"
        q2: 1.0e-3
      R:
        type: "scaled_identity"
        r2: 1.0e-3
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      inv_r2_db:
        values: [-10, 0, 10, 20, 30]

  - task_id: C_shift_Rscale_v0
    task_name: "Noise Shift: R scale (paper-like)"
    task_family: linear_gaussian_v0
    system_type: linear
    x_dim: 5
    y_dim: 5
    sequence_length_T: 100
    dataset_sizes:
      N_train: 1000
      N_val: 100
      N_test: 200
    noise:
      pre_shift:
        Q: { type: "scaled_identity", q2: 1.0e-3 }
        R: { type: "scaled_identity", r2: 1.0e-3 }
        obs_distribution: { name: "gaussian" }
      shift:
        t0: 50
        post_shift:
          obs_distribution: { name: "gaussian" }
          R_scale: 10.0
    observation:
      type: "full"
      h_type: "linear"
      H: "canonical_inverse"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      inv_r2_db:
        values: [-10, 0, 10, 20, 30]

  - task_id: B_lorenz_dt_v0
    task_name: "Lorenz Attractor (DT, partial obs, paper-like)"
    task_family: lorenz_v0
    system_type: nonlinear
    x_dim: 3
    y_dim: 2
    sequence_length_T: 100
    dataset_sizes:
      N_train: 1000
      N_val: 100
      N_test: 200
    lorenz:
      sigma: 10.0
      rho: 28.0
      beta: 2.6666666667
      J_true: 5
      J_assumed: 5
      delta_tau_true: 0.02
      delta_tau_assumed: 0.02
      obs_mode: partial
      state_clip: 100.0
    noise:
      Q: { type: "scaled_identity", q2: 1.0e-4 }
      R: { type: "scaled_identity", r2: 1.0e-1 }
    observation:
      type: "partial"
      h_type: "partial"
      mode: "partial"
    mismatch:
      enabled: false
      kind: "none"
      params: {}
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      inv_r2_db:
        values: [-10, 0, 10, 20, 30]

  - task_id: D_nclt_v0
    task_name: "NCLT (real dataset, paper-like)"
    task_family: nclt_v0
    system_type: real
    x_dim: 6
    y_dim: 2
    sequence_length_T: 50
    dataset_sizes:
      N_train: 80
      N_val: 5
      N_test: 1
    dataset:
      protocol: split_kalmannet_2023
      sampling_hz: 1.0
      split_overrides:
        train: { session: "2012-01-22", L: 80, T: 50, stride: 1 }
        val:   { session: "2012-01-22", L: 5,  T: 200, stride: 1 }
        test:  { session: "2012-04-29", L: 1,  T: 2000, stride: 1 }
    observation:
      type: "real"
      h_type: "unknown"
    control_input_u: false
    ground_truth:
      has_gt: true
    sweep:
      inv_r2_db:
        values: [-10, 0, 10, 20, 30]

models:
  - model_id: mb_kf_oracle
    display_name: "Model-Based KF (Oracle)"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    enabled: true
    baseline_mode: "oracle"
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: mb_kf_nominal
    display_name: "Model-Based KF (Nominal)"
    adapter: "bench.models.mb_kf:ModelBasedKFAdapter"
    enabled: true
    baseline_mode: "nominal"
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true

  - model_id: kalmannet_tsp
    display_name: "KalmanNet_TSP"
    adapter: "bench.models.kalmannet_tsp:KalmanNetTSPAdapter"
    enabled: true
    repo:
      path: "third_party/KalmanNet_TSP"
      entrypoints:
        A_linear_canonical_v0: "main_linear_canonical.py"
        C_shift_Rscale_v0: "main_linear_canonical.py"
        B_lorenz_dt_v0: "main_lor_DT.py"
        D_nclt_v0: "main_linear_canonical.py"
    batch_size: 30
    lr: 1.0e-4
    weight_decay: 1.0e-3
    max_grad_norm: 1.0
    train_steps_hint: 4000
    val_eval_interval_updates: 100
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true
    notes:
      repo_defaults:
        N_E: 1000
        N_CV: 100
        N_T: 200
        T: 100
        n_steps: 4000

  - model_id: adaptive_knet
    display_name: "Adaptive-KNet-ICASSP24"
    adapter: "bench.models.adaptive_knet:AdaptiveKNetAdapter"
    enabled: true
    repo:
      path: "third_party/Adaptive-KNet-ICASSP24"
      entrypoints:
        A_linear_canonical_v0: "main_linear_canonical.py"
        C_shift_Rscale_v0: "main_cm_linear_noise.py"
        B_lorenz_dt_v0: "main_cm_linear.py"
        D_nclt_v0: "main_cm_linear.py"
    batch_size: 32
    lr: 1.0e-3
    weight_decay: 1.0e-3
    max_grad_norm: 1.0
    adapt_lr: 1.0e-6
    adapt_max_grad_norm: 1.0
    knet_trainable: true
    train_steps_hint: 50000
    val_eval_interval_updates: 100
    capabilities:
      supports_adaptation: true
      outputs_covariance: false
      needs_system_model: true
    notes:
      repo_defaults:
        N_E: 1000
        N_CV: 100
        N_T: 200
        T: 100
        n_steps: 50000

  - model_id: maml_knet
    display_name: "MAML-KalmanNet"
    adapter: "bench.models.maml_knet:MAMLKNetAdapter"
    enabled: true
    repo:
      path: "third_party/MAML_KalmanNet"
      entrypoints:
        A_linear_canonical_v0: "main_linear.py"
        C_shift_Rscale_v0: "main_linear.py"
        B_lorenz_dt_v0: "main_nonlinear.py"
        D_nclt_v0: "main_linear.py"
    batch_size: 4
    outer_lr: 1.0e-3
    inner_lr: 5.0e-2
    inner_steps: 4
    meta_task_num: 16
    support_size: 6
    query_size: 15
    max_grad_norm: 1.0
    val_eval_interval_updates: 100
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: true
    notes:
      data_generation_use_cuda: false
      repo_defaults:
        epoch_linear: 20001
        epoch_nonlinear: 30001
        task_num: 16
        k_spt: 6
        q_qry: 15
        meta_lr: 1.0e-3
        update_lr: 5.0e-2
        update_step: 4

  - model_id: split_knet
    display_name: "Split-KalmanNet"
    adapter: "bench.models.split_knet:SplitKNetAdapter"
    enabled: true
    repo:
      path: "third_party/Split_KalmanNet"
      entrypoints:
        A_linear_canonical_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
        C_shift_Rscale_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
        B_lorenz_dt_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
        D_nclt_v0: "GSSFiltering/filtering.py::Split_KalmanNet_Filter"
    estimator_class_path: "GSSFiltering.filtering.Split_KalmanNet_Filter"
    lr: 1.0e-3
    weight_decay: 0.0
    max_grad_norm: 10.0
    val_eval_interval_updates: 25
    train_init_from_gt: true
    eval_init_from_gt: false
    capabilities:
      supports_adaptation: false
      outputs_covariance: false
      needs_system_model: false
    notes:
      repo_defaults:
        synthetic_train_seq_num: 500
        synthetic_valid_seq_num: 5
        synthetic_test_seq_num: 10
        synthetic_train_seq_len: 15
        synthetic_valid_seq_len: 50
        synthetic_test_seq_len: 100
        train_iter_synthetic: 500
        train_iter_nclt: 4000

runner:
  device: "cuda"
  precision: "fp32"
  deterministic: true
  enabled_policy:
    task_default: true
    model_default: true
    skip_if_disabled: true
  data_mode: "bench_generated"
  budget:
    train_max_updates: 2000
    eval_batch_size: 32
  early_stopping:
    monitor: "val/mse_db"
    mode: "min"
    patience_evals: 20
    min_delta: 0.0
  tracks:
    - track_id: frozen
      adaptation_enabled: false
    - track_id: budgeted
      adaptation_enabled: true
      adaptation_budget:
        max_updates: 100
        max_updates_per_step: 1
        allowed_after_t0_only: true

metrics:
  list: ["mse", "rmse", "mse_db", "timing_ms_per_step", "nll", "shift_recovery_k"]
  nll_policy:
    if_no_covariance: "NA"
  shift_recovery_definition:
    window_W: 20
    tolerance_eps: 0.05
    metric: "mse"
    aggregation: "mean_over_window"

reporting:
  output_dir_template: "runs/{suite.name}/{task_id}/{model_id}/{track_id}/seed_{seed}/scenario_{scenario_id}"
  artifacts:
    - "config_snapshot.yaml"
    - "metrics.json"
    - "metrics_step.csv"
    - "timing.csv"
    - "stdout.log"
    - "stderr.log"
    - "env.txt"
    - "git_versions.txt"
  tables:
    summary_csv: "reports/summary_all_simple_paperlike.csv"
  plots:
    - "mse_vs_time.png"
    - "shift_recovery_curve.png"
    - "mismatch_severity_sweep.png"
